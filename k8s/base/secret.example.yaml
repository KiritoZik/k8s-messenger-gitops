# Пример структуры секретов. НЕ ПРИМЕНЯТЬ напрямую.
# Реальные значения хранятся в overlays/dev/secrets.yaml
# и должны быть заполнены перед деплоем.
apiVersion: v1
kind: Secret
metadata:
  name: messager-db-secret
  namespace: messenger
type: Opaque
stringData:
  POSTGRES_USER: "CHANGEME_DB_USER"
  POSTGRES_PASSWORD: "CHANGEME_DB_PASSWORD"
  USER_DB_DSN: "host=postgres user=CHANGEME_DB_USER password=CHANGEME_DB_PASSWORD dbname=users sslmode=disable"
  MSG_DB_DSN: "host=postgres user=CHANGEME_DB_USER password=CHANGEME_DB_PASSWORD dbname=messages sslmode=disable"
  GOOSE_USER_DBSTRING: "host=postgres user=CHANGEME_DB_USER password=CHANGEME_DB_PASSWORD dbname=users sslmode=disable"
  GOOSE_MSG_DBSTRING: "host=postgres user=CHANGEME_DB_USER password=CHANGEME_DB_PASSWORD dbname=messages sslmode=disable"
