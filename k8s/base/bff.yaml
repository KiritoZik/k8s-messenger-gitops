apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff
  namespace: messenger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bff
  template:
    metadata:
      labels:
        app: bff
    spec:
      containers:
        - name: bff
          image: mablinov2704/bff:latest
          ports:
            - containerPort: 8080
          env:
            - name: HTTP_PORT
              valueFrom:
                configMapKeyRef:
                  name: messager-config
                  key: BFF_HTTP_PORT
            - name: USER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: messager-config
                  key: USER_SERVICE_URL
            - name: MSG_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: messager-config
                  key: MSG_SERVICE_URL
          resources:
            requests:
              cpu: "150m"
              memory: "192Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: bff
  namespace: messenger
spec:
  selector:
    app: bff
  ports:
    - name: http
      port: 8080
      targetPort: 8080
