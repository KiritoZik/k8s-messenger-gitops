# prod: повышенные requests/limits для стабильной работы
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: messenger
spec:
  template:
    spec:
      containers:
        - name: frontend
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: apps/v1
