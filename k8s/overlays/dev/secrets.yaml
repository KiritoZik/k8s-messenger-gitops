# =============================================================================
# Secrets — dev overlay
# Contains all credentials for the dev/lab environment.
# DO NOT commit real credentials to version control in production.
# =============================================================================

# --- Application DB credentials ----------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: messager-db-secret
  namespace: messenger
type: Opaque
stringData:
  POSTGRES_USER: "messenger"
  POSTGRES_PASSWORD: "messenger_pass"
  USER_DB_DSN: "host=postgres user=messenger password=messenger_pass dbname=users sslmode=disable"
  MSG_DB_DSN: "host=postgres user=messenger password=messenger_pass dbname=messages sslmode=disable"
  GOOSE_USER_DBSTRING: "host=postgres user=messenger password=messenger_pass dbname=users sslmode=disable"
  GOOSE_MSG_DBSTRING: "host=postgres user=messenger password=messenger_pass dbname=messages sslmode=disable"

# --- MinIO server credentials ------------------------------------------------
---
# Referenced by the MinIO Deployment (MINIO_ROOT_USER / MINIO_ROOT_PASSWORD)
apiVersion: v1
kind: Secret
metadata:
  name: minio-secret
  namespace: messenger
type: Opaque
stringData:
  accessKeyID: "admin"
  secretAccessKey: "password"
