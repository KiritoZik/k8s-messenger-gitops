# CSI credentials for ch.ctrox.csi.s3-driver — MUST stay in kube-system so
# kubelet NodeAuthorizer can read the secret during node publish/stage.
# Listed separately from secrets.yaml so it is never confused with app secrets.
apiVersion: v1
kind: Secret
metadata:
  name: csi-s3-secret
  namespace: kube-system
type: Opaque
stringData:
  accessKeyID: "admin"
  secretAccessKey: "password"
  endpoint: "http://minio.messenger.svc.cluster.local:9000"
